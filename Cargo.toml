[workspace]
resolver = "2"
members = [
    "crates/miden-zk-primitives",
    "examples/private-voting",
    "examples/age-verification",
    "examples/zk-credential",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
rust-version = "1.80"
license = "MIT"
repository = "https://github.com/amathxbt/miden-zk-primitives"
authors = ["amathxbt"]

[workspace.dependencies]
miden-core       = { version = "0.13", default-features = false }
miden-assembly   = { version = "0.13", default-features = false }
miden-processor  = { version = "0.13", default-features = false }
miden-prover     = { version = "0.13", default-features = false }
miden-verifier   = { version = "0.13", default-features = false }
winter-crypto    = { version = "0.12", default-features = false }
rand             = "0.8"
thiserror        = "2"
serde            = { version = "1", features = ["derive"] }
serde_json       = "1"

[profile.release]
lto = true
codegen-units = 1
