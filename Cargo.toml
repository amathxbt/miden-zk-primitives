[workspace]
resolver = "2"
members = [
    "crates/miden-zk-primitives",
    "crates/miden-collections",
]

[workspace.package]
version      = "0.1.0"
edition      = "2021"
rust-version = "1.80"
authors      = ["amathxbt"]
license      = "MIT OR Apache-2.0"
repository   = "https://github.com/amathxbt/miden-zk-primitives"
homepage     = "https://github.com/amathxbt/miden-zk-primitives"

[workspace.dependencies]
# Miden VM
miden-vm       = { version = "0.11", default-features = false }
miden-core     = { version = "0.11", default-features = false }
miden-assembly = { version = "0.11", default-features = false }
miden-prover   = { version = "0.11", default-features = false }
miden-verifier = { version = "0.11", default-features = false }
miden-stdlib   = { version = "0.11", default-features = false }

# General
anyhow       = "1"
thiserror    = "2"
rand         = "0.8"
serde        = { version = "1", features = ["derive"] }
serde_json   = "1"
hex          = "0.4"
tracing      = "0.1"
clap         = { version = "4", features = ["derive"] }

# Dev / test
criterion    = { version = "0.5", features = ["html_reports"] }
proptest     = "1"

[profile.release]
opt-level   = 3
lto         = "fat"
codegen-units = 1
panic       = "abort"

[profile.bench]
inherits    = "release"
debug       = true
